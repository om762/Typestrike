name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            target: typestrike-win-x64
            ext: .exe
            archive: zip
            node-arch: x64
          - os: windows-11-arm
            arch: arm64
            target: typestrike-win-arm64
            ext: .exe
            archive: zip
            node-arch: arm64
          - os: macos-latest
            arch: arm64
            target: typestrike-macos-arm64
            ext: ''
            archive: tar.gz
            node-arch: arm64
          - os: ubuntu-latest
            arch: x64
            target: typestrike-linux-x64
            ext: ''
            archive: tar.gz
            node-arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
            target: typestrike-linux-arm64
            ext: ''
            archive: tar.gz
            node-arch: arm64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Step 1: Bundle with esbuild ──
      - name: Bundle with esbuild
        run: npx -y esbuild sea-entry.js --bundle --platform=node --format=cjs --outfile=dist/typestrike-bundle.cjs --minify

      # ── Step 2: Generate SEA blob ──
      - name: Generate SEA blob
        run: node --experimental-sea-config sea-config.json

      # ── Step 3: Copy node binary ──
      - name: Copy node binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item (Get-Command node).Source "dist/${{ matrix.target }}${{ matrix.ext }}"

      - name: Copy node binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp "$(which node)" "dist/${{ matrix.target }}"

      # ── Step 4: Remove signature (macOS) ──
      - name: Remove code signature (macOS)
        if: runner.os == 'macOS'
        run: codesign --remove-signature "dist/${{ matrix.target }}"

      # ── Step 5: Inject SEA blob ──
      - name: Inject SEA blob
        run: npx -y postject "dist/${{ matrix.target }}${{ matrix.ext }}" NODE_SEA_BLOB dist/typestrike.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      # ── Step 6: Re-sign (macOS) ──
      - name: Ad-hoc sign (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - "dist/${{ matrix.target }}"

      # ── Step 7: Make executable (Unix) ──
      - name: Make executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x "dist/${{ matrix.target }}"

      # ── Step 8: Package ──
      - name: Package (zip - Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.target }}${{ matrix.ext }}" -DestinationPath "dist/${{ matrix.target }}.zip"

      - name: Package (tar.gz - Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          tar -czf "dist/${{ matrix.target }}.tar.gz" -C dist "${{ matrix.target }}"

      # ── Step 9: Generate checksum ──
      - name: Generate SHA256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist/${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.target }}.zip" | Out-File -FilePath "dist/${{ matrix.target }}.sha256" -Encoding ascii -NoNewline

      - name: Generate SHA256 checksum (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist && shasum -a 256 "${{ matrix.target }}.tar.gz" > "${{ matrix.target }}.sha256"

      # ── Step 10: Upload artifacts ──
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/${{ matrix.target }}.${{ matrix.archive }}
            dist/${{ matrix.target }}.sha256

  # ── Create GitHub Release ──
  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.sha256" \) -exec cp {} release/ \;
          echo "=== Release Assets ==="
          ls -lh release/

      - name: Combine checksums
        run: |
          cat release/*.sha256 > release/checksums.txt
          echo "=== Checksums ==="
          cat release/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.zip
            release/*.tar.gz
            release/checksums.txt
